env: "prod"
log_level: "INFO"
tz_name: "Asia/Calcutta"

ingress_host: "0.0.0.0"
ingress_port: 8000
ingress_path: "/machine/realtime_glog"
expected_request_code: "realtime_glog"

direct_listener_host: "0.0.0.0"
direct_listener_port: 8010
direct_listener_path: "/machine/realtime_glog"
direct_listener_jsonl_path: "var/direct_listener/punches.jsonl"

db_url: "mssql+pyodbc://USER:PASSWORD@SERVER/DBNAME?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=yes&TrustServerCertificate=no"
db_echo: false

outbox_batch_size: 500
outbox_poll_seconds: 0.5
processing_lease_seconds: 180
stale_processing_seconds: 420
max_retries: 5
backoff_base_seconds: 2.0
backoff_max_seconds: 120.0
backoff_jitter_seconds: 1.0

outbound_url: "https://third-party.example.com/api/attendance"
outbound_api_key_header: "x-api-key"
outbound_api_key: "replace-in-secret-store"
outbound_timeout_seconds: 15.0
outbound_verify_tls: true
outbound_method: "POST"
enforce_https: true
enforce_post: true
outbound_include_extended_fields: true
outbound_device_name_default: ""
outbound_device_no_default: ""
outbound_relay_enabled: true
outbound_http_retries: 2
failed_outbox_replay_enabled: true
failed_outbox_replay_interval_seconds: 3600
failed_outbox_replay_batch_size: 50

fk_web_listener_host: "0.0.0.0"
fk_web_listener_port: 8081

worker_health_file: "var/worker/health.json"
worker_fatal_on_max_loop_errors: false
live_push_auto_heal_enabled: true
live_push_heal_interval_seconds: 900
fk_health_file: "var/fk_listener/health.json"
supervisor_health_file: "var/supervisor/health.json"
network_ready_max_wait_seconds: 120

machine_sdk_dll_path: "sdk_extracted/20211204-SBXPC-1/bin/SBXPCDLL64.dll"
machine_sync_ip: ""
machine_sync_port: 5005
machine_sync_password: 0
machine_sync_machine_number: 1

middleware_api_key: "replace-in-secret-store"
agent_api_key: "replace-in-secret-store"
agent_jwt_token: "replace-in-secret-store"
webhook_hmac_secret: "replace-in-secret-store"
webhook_timeout_seconds: 10.0
webhook_dispatch_batch_size: 200
